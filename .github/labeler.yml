---
go:
  - "**/*.go"
go/api:
  - internal/**/api/**/*.go
  - internal/**/handlers/**/*.go
  - internal/**/controllers/**/*.go
  - cmd/app/**/*.go
go/internal:
  - internal/**/*.go
go/models:
  - internal/**/models/**/*.go
  - internal/**/entities/**/*.go
go/services:
  - internal/**/services/**/*.go
  - internal/**/service/**/*.go
go/repositories:
  - internal/**/repositories/**/*.go
  - internal/**/repository/**/*.go
go/configurations:
  - internal/**/configurations/**/*.go
  - internal/**/config/**/*.go
go/contracts:
  - internal/**/contracts/**/*.go
  - internal/**/interfaces/**/*.go
go/dtos:
  - internal/**/dtos/**/*.go
  - internal/**/dto/**/*.go
database:
  - db/**/*
  - "**/*.sql"
migrations:
  - db/migrations/**/*
  - "**/migrations/**/*"
docker:
  - Dockerfile*
  - docker-compose*.yml
  - docker-compose*.yaml
  - .dockerignore
  - "**/.dockerignore"
github-actions:
  - .github/workflows/**/*
  - .github/actions/**/*
documentation:
  - "**/*.md"
  - docs/**/*
  - "**/*.rst"
  - "**/*.txt"
  - CHANGELOG*
  - README*
  - CONTRIBUTING*
  - LICENSE*
security:
  - SECURITY.md
  - "**/*security*"
  - .github/SECURITY.md
configuration:
  - configs/**/*
  - "**/*.toml"
  - "**/*.ini"
  - "**/*.properties"
  - "**/*.env*"
  - .env*
json-config:
  - "**/*.json"
  - "!go.sum"
  - "!package-lock.json"
yaml-config:
  - "**/*.yml"
  - "**/*.yaml"
  - "!.github/workflows/**/*"
tests:
  - "**/*_test.go"
  - "**/test/**/*"
  - "**/tests/**/*"
  - "**/*_test_*.go"
github-metadata:
  - .github/**/*
  - "!.github/workflows/**/*"
dependabot:
  - .github/dependabot.yml
scripts:
  - Makefile
  - "**/*.sh"
  - scripts/**/*
  - build/**/*
build:
  - Makefile
  - "**/build.*"
  - "**/*.mk"
dependencies:
  - go.mod
  - go.sum
  - vendor/**/*
go-mod:
  - go.mod
  - go.sum
cmd:
  - cmd/**/*
main:
  - cmd/**/main.go
  - "**/main.go"
shared:
  - internal/shared/**/*
  - "**/shared/**/*"
  - "**/common/**/*"
customers:
  - internal/customers/**/*
env-config:
  - .air.toml
  - revive-config.toml
  - "**/*.toml"
third-party:
  - vendor/**/*
  - third_party/**/*
  - external/**/*
size/small:
  - any:
      - "**/*"
    all:
      - "!**/large_file_pattern"
size/medium:
  - any:
      - "**/*"
size/large:
  - any:
      - "**/*"
critical:
  - cmd/app/main.go
  - internal/shared/app/**/*
  - configs/application.production.json
infrastructure:
  - infrastructure/**/*
  - deploy/**/*
  - k8s/**/*
  - "**/*deploy*"
performance:
  - "**/*performance*"
  - "**/*benchmark*"
  - "**/*_bench.go"
