run:
  timeout: 5m
  go: "1.24.3"
  modules-download-mode: readonly

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true

linters-settings:
  gofmt:
    simplify: true
  gofumpt: {}
  govet:
    enable-all: true
  shadow:
    strict: true
  revive:
    confidence: 0.8
    severity: warning
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id
  staticcheck:
    checks: ["all", "-ST1000", "-U1000"]
  gosec:
    severity: medium
    confidence: medium
    excludes:
      - G104 # Unhandled errors (covered by errcheck)
  cyclop:
    max-complexity: 15
  gocyclo:
    min-complexity: 15
  goconst:
    min-len: 3
    min-occurrences: 3
  misspell:
    locale: US
  lll:
    line-length: 120
  funlen:
    lines: 80
    statements: 40
  gocognit:
    min-complexity: 15

linters:
  enable:
    - gofmt
    - gofumpt
    - govet
    - shadow
    - revive
    - staticcheck
    - gosec
    - cyclop
    - gocyclo
    - goconst
    - misspell
    - lll
    - funlen
    - gocognit
    - errcheck
    - ineffassign
    - typecheck
    - unused
    - gosimple

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
  exclude-rules:
    # Exclude some linters from running on tests files
    - path: _test\.go
      linters:
        - gocyclo
        - errcheck
        - funlen
        - gocognit
    # Exclude generated files
    - path: ".*\\.pb\\.go"
      linters:
        - all
    # Exclude vendor directories
    - path: vendor/
      linters:
        - all