app:
  name: customer-read-service
  logger: main

container:
  type: dig

http-servers:
  instances:
    main:
      type: echo
      host: 127.0.0.1
      port: 8001
      debug: true
      logger: main-http-server

rpc-servers:
  instances:
    main:
      type: grpc
      host: 127.0.0.1
      port: 9001
      debug: true
      logger: main-rpc-server

database-clients:
  instances:
    customers-read-db:
      type: mongodb
      host: localhost
      port: 27017
      user: admin
      password: admin
      database: customers-read
      sslMode: false

loggers:
  type: logrus
  level: debug
  instances:
    main:
      prefix: customer-read-service
    main-http-server:
      prefix: customer-read-service (http-server)
    main-rpc-server:
      prefix: customer-read-service (rpc-server)

migrations:
  instances:
    customer-read-service:
      db: customers-read-db
      migrationsDir: db/migrations
